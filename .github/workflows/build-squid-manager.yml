name: Build Squid Manager

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "SquidManager"
  SCRIPT_NAME: "squid_manager.py"

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Abhängigkeiten installieren
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 polib matplotlib

      - name: Anwendung bauen
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name "${{ env.APP_NAME }}" `
            --collect-all matplotlib `
            --hidden-import PyQt5.sip `
            "${{ env.SCRIPT_NAME }}"

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: dist/${{ env.APP_NAME }}/
